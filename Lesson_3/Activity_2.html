<html>
    <head>
        <meta charset="utf-8">
        
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formatting a page</title>
    </head>
    <body>
        <b>Hello and Welcome</b><br>
        <strong>Hello and Welcome</strong><br>
        <i>Hello and Welcome</i><br>
        <em>Hello and Welcome</em><br>
        <mark>Hello and Welcome</mark><br>
        <small>Hello and Welcome</small><br>
        <del>Hello and Welcome</del><br>
        <p>A simple math formula is A<sup>2</sup>+B<sup>2</sup>=C<sup>2</sup></p>
        <p>The chemical formula of silver nitrate is AgNO<sub>3</sub></p>
    </body>
</html>
