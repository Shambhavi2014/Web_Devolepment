<html>

<head>
    <title>Bootstrap Jumbotron</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.js"></script>
    <style>
        body {
            text-align: center;
            color: orange;
        }

        h2 {
            color: blueviolet
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Badges</h2>
        <p>To create a basic progress bar add a .progress class to the container element and add the .progress class to the child element.
            Use the CSS width property to add with to the progress bar.</p>
        <div class="progress">
            <div class="progress-bar" style="width:70%">70%</div>
        </div>
    </div>
</body>

</html>
