<html>
    <head>
        <title>Bootstrap Jumbotron</title>
       <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.js"></script>
        <style>
            body{
                text-align: center;
                color:orange;
            }
            h2{
                color:blueviolet
            }
        </style>
    </head>
    <body>
        <div class="jumbotron jumbotron-fluid">
            <div class="container">
            <h1>Codingal</h1>
            <p>Codingal will help you fall in love with coding.</p>
            </div>
        </div>
        <div class="container">
            <h2>Buttons</h2>
            <h3>You can make them in different colors</h3>
            <button type="button"class=" btn btn-primary">Primary</button>
            <button type="button" class="btn btn-danger">Danger</button>
            <button type="button" class="btn btn-success">Success</button>
            <button type="button" class="btn btn-warning">Warning</button>
            <button type="button" class="btn btn-secondary">Secondary</button>
        </div>
    </body>
</html>
