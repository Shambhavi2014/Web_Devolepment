<html>
    <head>
        <title>BootsStrap Size</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container">
            <h3>Hello Students!</h3>
            <p>Re-size the border to see its effet!</p>
            <div class="row">
                <div class="col-md-8 col-xs-4" style="background-color: #e48989;">xs</div>
                <div class="col-md-12 col-md-5" style="background-color: rgb(153, 214, 234);border:1px solid black;">.col-xs-3</div>
            </div>
            <div class="row">
                <div class="col-md-12 col-lg-6" style="background-color: rgb(251, 183, 119);border:1px solid black;">,col-xs-6</div>
                <div class="col-xs-6 col-md-2" style="background-color: rgb(228, 137, 137);">.col-xs-6</div>
            </div>
            <div class="row" style="background-color:rgb(97, 194, 65);">
                <div class="col-xs-6">.col-xs-6</div>
                <div class="col-xs-6">col-xs-6</div>
            </div>
        </div>
    </body>
</html>
