<html>

<head>
    <title>BootsStrap </title>
    <meta charset="UTF-8">
    <meta name="viewport" content=" width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>
    <div class="container-fluid">
        <h2>Here we are making Unequal Grids</h2>
        <p>We are also using 'fluid' in container so that it dose not leave space</p>
        <div class="row">
            <div class="col-md-8 col-xs-4" style="background-color: #e48989;">These </div>
            <div class="col-md-12 col-md-5" style="background-color: rgb(241, 243, 114);border:1px solid black;">
                are </div>
        </div>
        <div class="row">
            <div class="col-md-4 col-lg-4" style="background-color: rgb(196, 251, 119);border:1px solid black;">
               unequal </div>
            <div class="col-xs-6 col-md-2" style="background-color: rgb(137, 210, 228);">grids!</div>
        </div>
        <div class="container">
            <h3>Here also we made unequal grids but</h3>
            <p>We are not using 'fluid' in container so now it leaves space at th start & end.</p>
            <div class="row">
                <div class="col-md-12 col-xs-4" style="background-color: #e48989;">These </div>
                <div class="col-md-3 col-md-5" style="background-color: rgb(241, 243, 114);border:1px solid black;">
                    are also</div>
            </div>
            <div class="row">
                <div class="col-md-11 col-lg-4" style="background-color: rgb(196, 251, 119);border:1px solid black;">
                    unequal </div>
                <div class="col-xs-8 col-md-2" style="background-color: rgb(137, 210, 228);">grids!</div>
           </div>
        </div>
    </body>
    </html>
