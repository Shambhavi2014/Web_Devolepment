<html>
    <head>
        <title>Cuisines</title>
        <style>
            
                .A{grid-area:header ;
                color:blue; }
                .B{grid-area:biriyani ;
                color:blueviolet }
                .C{grid-area:bi ;
                  }
                .D{grid-area:thali ;
                 color:aqua }
                .E{grid-area:th ; }
                .F{grid-area:food ;
                color:pink }
                .G{grid-area:pic ; 
                color:pink}


               .grid-container{
                display:grid;
                grid-template-columns:auto auto auto auto auto;
                grid-template-areas: "header header  header  header  header"
                                     "food food pic pic pic"
                                    "biriyani biriyani bi bi bi "
                                    "thali thali th th th ";
                                    background-color: rgb(239, 141, 232);
                                    padding:10px;
               }
               .grid-container div{
                background-color: rgb(127, 219, 255);
                text-align:center;
                padding:20px;
                border:10px solid greenyellow
               }
        </style>
    </head>
    <body>
        <div class="grid-container">
            <div class="A">Famous Indian Cuisines</div>
            <div class="B">Biriyani</div>
            <div class="C"><img src="https://biryanibowlwa.com/wp-content/uploads/2021/04/Chicken-Dum-Biryani-1.jpg" width=60% height="50%"></div>
            <div class="D">Thali</div>
            <div class="E"><img src="https://wallpapers.com/images/hd/traditional-thali-platter-indian-food-7ppdmw8bs4n1f36j.jpg" width=60%
                height="50%"></div>
            <div class="F">Food</div>
            <div class="G">Pictures</div>
        </div>
    </body>
</html>
