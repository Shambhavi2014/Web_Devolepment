<html>
    <head>
        <title>
            Grid Layout
        </title>
        <style>
            .A{grid-area:header ; }
             .B{grid-area:menu ; }
              .C{grid-area:main ; }
               .D{grid-area:footer ; }
               .grid-item1{grid-area:header ; }
             .grid-item2{grid-area:menu ; }
              .grid-item3{grid-area:main ; }
               .grid-item4{grid-area:footer ; }
                
                
               .grid-container{
                display:grid;
                grid-template-columns:auto auto auto auto auto;
                grid-template-areas: "header header  header  header  header"
                                     "menu main main main main"
                                    "menu footer footer footer footer";
                                    background-color: rgb(157, 239, 141);
                                    padding:10px;
               }
               .grid-container div{
                background-color: rgb(255, 127, 142);
                text-align:center;
                padding:20px;
                border:3px solid greenyellow
               }
               
               
        </style>

    </head>
    <body>
        <div class="grid-container">
            <div class="grid-item1">Header</div>
<div class="grid-item2">Menu</div>
<div class="grid-item3">Main</div>
<div class="grid-item4">Footer</div>
        </div>
    </body>
</html>
