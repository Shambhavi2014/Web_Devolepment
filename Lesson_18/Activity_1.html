<html>
    <head>
        <title>Carousel</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.js"></script>
    </head>
<body>
    <div class="container">
        <h2>Carousel</h2>
        <div id="Carousel" class="carousel slide" data-ride="carousel">
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide to="0" ></li>
                <li data-target="#myCarousel" data-slide to="0" ></li>
            </ol>
        

        <div class="carousel-inner">
            <div class="item-active">
                <img src="https://cdn.britannica.com/79/232779-050-6B0411D7/German-Shepherd-dog-Alsatian.jpg"alt="Image 1">
            </div>
            <div class="item">
                <img src="https://cdn.pixabay.com/photo/2021/05/07/07/40/german-shepherd-dog-6235368_1280.jpg" alt="Image 2">
            </div>
             <div class="item">
                <img src="https://petgearlab.com/wp-content/uploads/2023/07/dog-g91816e36d_1920-1024x769.jpg" alt="Image 3">
            </div>
        </div>

    <a class="left-carousel control" href="" data-slide="perv">
        <span class="glyphicon glyphicon-chevron-left"></span>
        <span class="se-only">Previous</span>
    </a>
    <a class="right-carousel control" href="#myCarousel" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right"></span>
        <span class="se-only">Next</span>
    </a>
    </div>
    </div>
</body>
</html>
